<!DOCTYPE html>
<html lang="cs">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SOS HNED Partner – dashboard pro partnery havarijního dispečinku. Přijímejte SOS požadavky v reálném čase.">
  
  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SOS Partner">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#07070D" media="(prefers-color-scheme: dark)">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  
  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Open Graph -->
  <meta property="og:title" content="SOS HNED Partner">
  <meta property="og:description" content="Dashboard pro partnery havarijního dispečinku SOS HNED">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <title>SOS HNED Partner</title>

  <style>
    /* ═══ AGGRESSIVE FULLSCREEN — NO BLACK BARS ═══ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
      overflow: hidden;
      background: #FFFFFF;
      /* Kill safe area padding that creates black bars */
      padding: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0) 0;
      padding: 0 !important;
    }
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
      overflow: hidden;
      background: #FFFFFF;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      /* Extend behind notch / home indicator */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    /* Make Flutter canvas fill ENTIRE screen including safe areas */
    flutter-view,
    flt-glass-pane,
    flt-scene-host,
    flt-semantics-placeholder {
      width: 100% !important;
      height: 100% !important;
      height: 100dvh !important;
      min-height: 100dvh !important;
      min-height: -webkit-fill-available !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      inset: 0 !important;
      overflow: hidden !important;
    }
    /* Override Flutter shadow DOM elements */
    flt-glass-pane::part(host) {
      width: 100% !important;
      height: 100% !important;
      position: fixed !important;
      inset: 0 !important;
    }
    /* Loading indicator */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: #FFFFFF;
      flex-direction: column;
      gap: 16px;
    }
    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,0,0,0.06);
      border-top-color: #ef4444;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading p {
      color: rgba(0,0,0,0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Dark mode override */
    @media (prefers-color-scheme: dark) {
      html, body { background: #07070D; }
      .loading { background: #07070D; }
      .loading .spinner { border-color: rgba(255,255,255,0.1); border-top-color: #ef4444; }
      .loading p { color: rgba(255,255,255,0.4); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Načítám SOS HNED Partner…</p>
  </div>

  <script>
    // Force Safari to use full viewport height (kills black bars)
    function fixViewport() {
      var vh = window.innerHeight;
      document.documentElement.style.setProperty('height', vh + 'px');
      document.body.style.setProperty('height', vh + 'px');
      // Also fix Flutter's elements
      var els = document.querySelectorAll('flutter-view, flt-glass-pane');
      els.forEach(function(el) {
        el.style.setProperty('height', vh + 'px', 'important');
        el.style.setProperty('min-height', vh + 'px', 'important');
      });
    }
    fixViewport();
    window.addEventListener('resize', fixViewport);
    window.addEventListener('orientationchange', function() {
      setTimeout(fixViewport, 100);
    });
    // Re-run after Flutter loads
    window.addEventListener('load', function() {
      fixViewport();
      setTimeout(fixViewport, 500);
      setTimeout(fixViewport, 1500);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
